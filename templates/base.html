<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>QuickBite Kigali</title>
    <link
      rel="stylesheet"
      href="{{ url_for('static', filename='css/style.css') }}"
    />
  </head>
  <body>
    <nav class="navbar">
      <div class="nav-container">
        <a href="{{ url_for('index') }}" class="nav-logo"
          >🍔 QuickBite Kigali</a
        >
        <ul class="nav-links">
          <li><a href="{{ url_for('index') }}">Home</a></li>
          <li><a href="{{ url_for('menu') }}">Menu</a></li>
          <li><a href="{{ url_for('about') }}">About Us</a></li>
          <li>
            <a href="{{ url_for('cart') }}" class="cart-icon"
              >🛒 Cart <span id="cart-count">0</span></a
            >
          </li>
          <li>
            <button
              id="dark-mode-btn"
              onclick="toggleDarkMode()"
              class="btn-secondary"
            >
              🌙 Dark Mode
            </button>
          </li>
        </ul>
      </div>
    </nav>

    <main>{% block content %}{% endblock %}</main>

    <footer>
      <p>&copy; 2026 QuickBite Kigali. All rights reserved.</p>
    </footer>

    <script src="{{ url_for('static', filename='js/cart.js') }}"></script>
  </body>
</html>

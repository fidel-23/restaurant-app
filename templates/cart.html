{% extends 'base.html' %} {% block content %}
<section class="cart-page">
  <h1>Your Cart</h1>

  <div id="cart-empty" style="display: none">
    <p>Your cart is empty.</p>
    <a href="{{ url_for('menu') }}" class="btn-primary">Browse Menu</a>
  </div>

  <div id="cart-content">
    <table class="cart-table">
      <thead>
        <tr>
          <th>Item</th>
          <th>Price</th>
          <th>Quantity</th>
          <th>Subtotal</th>
          <th>Remove</th>
        </tr>
      </thead>
      <tbody id="cart-items"></tbody>
    </table>

    <div class="cart-total">
      <h3>Total: RWF <span id="cart-total">0</span></h3>
    </div>

    <a href="{{ url_for('checkout') }}" class="btn-primary"
      >Proceed to Checkout</a
    >
  </div>
</section>

<script>
  document.addEventListener("DOMContentLoaded", function () {
    renderCart();
  });

  function renderCart() {
    fetch("/api/cart")
      .then((res) => res.json())
      .then((data) => {
        const cart = data.cart;
        const cartEmpty = document.getElementById("cart-empty");
        const cartContent = document.getElementById("cart-content");
        const tbody = document.getElementById("cart-items");

        if (cart.length === 0) {
          cartEmpty.style.display = "block";
          cartContent.style.display = "none";
          return;
        }

        cartEmpty.style.display = "none";
        cartContent.style.display = "block";
        tbody.innerHTML = "";
        let total = 0;

        cart.forEach((item) => {
          const subtotal = parseFloat(item.price) * parseInt(item.quantity);
          total += subtotal;

          const row = document.createElement("tr");
          row.innerHTML = `
                    <td>${item.name}</td>
                    <td>RWF ${parseFloat(item.price).toFixed(0)}</td>
                    <td>
                        <button class="qty-btn" data-id="${item.id}" data-action="decrease">-</button>
                        <span>${item.quantity}</span>
                        <button class="qty-btn" data-id="${item.id}" data-action="increase">+</button>
                    </td>
                    <td>RWF ${subtotal.toFixed(0)}</td>
                    <td><button class="remove-btn" data-id="${item.id}">❌</button></td>
                `;
          tbody.appendChild(row);
        });

        document.getElementById("cart-total").innerText = total.toFixed(0);

        document.querySelectorAll(".qty-btn").forEach((btn) => {
          btn.addEventListener("click", function () {
            const id = parseInt(this.dataset.id);
            const action = this.dataset.action;
            const currentQty = parseInt(
              this.parentElement.querySelector("span").innerText,
            );
            const newQty =
              action === "increase" ? currentQty + 1 : currentQty - 1;
            if (newQty < 1) return;
            fetch("/api/cart/update", {
              method: "POST",
              headers: { "Content-Type": "application/json" },
              body: JSON.stringify({ id: id, quantity: newQty }),
            }).then(() => renderCart());
          });
        });

        document.querySelectorAll(".remove-btn").forEach((btn) => {
          btn.addEventListener("click", function () {
            const id = parseInt(this.dataset.id);
            fetch("/api/cart/remove", {
              method: "POST",
              headers: { "Content-Type": "application/json" },
              body: JSON.stringify({ id: id }),
            }).then(() => renderCart());
          });
        });
      });
  }
</script>
{% endblock %}

{% extends 'base.html' %} {% block content %}
<section class="checkout-page">
  <h1>Checkout</h1>

  <form method="POST" action="{{ url_for('checkout') }}">
    <div class="form-group">
      <label>Full Name</label>
      <input
        type="text"
        name="name"
        placeholder="Your full name"
        value="{{ customer['name'] if customer else '' }}"
        required
      />
    </div>
    <div class="form-group">
      <label>Phone Number</label>
      <input
        type="text"
        name="phone"
        placeholder="e.g. 0788123456"
        value="{{ customer['phone'] if customer else '' }}"
        required
      />
    </div>
    <div class="form-group">
      <label>Delivery Address</label>
      <input
        type="text"
        name="address"
        placeholder="Your delivery address"
        value="{{ customer['address'] if customer else '' }}"
        required
      />
    </div>

    <div class="order-summary">
      <h3>Order Summary</h3>
      <div id="summary-items"></div>
      <h3>Total: RWF <span id="summary-total">0</span></h3>
    </div>

    <button type="submit" class="btn-primary">Place Order</button>
  </form>
</section>

<script>
  document.addEventListener("DOMContentLoaded", function () {
    fetch("/api/cart")
      .then((res) => res.json())
      .then((data) => {
        const cart = data.cart;
        let total = 0;
        let html = "";
        cart.forEach((item) => {
          const subtotal = item.price * item.quantity;
          total += subtotal;
          html += `<p>${item.name} x${item.quantity} — RWF ${subtotal}</p>`;
        });
        document.getElementById("summary-items").innerHTML = html;
        document.getElementById("summary-total").innerText = total;
      });
  });
</script>
{% endblock %}

{% extends 'base.html' %} {% block content %}
<section class="auth-page">
  <div class="auth-box">
    <h1>Create Account</h1>
    <p class="auth-subtitle">Join QuickBite Kigali and enjoy faster checkout</p>

    {% if error %}
    <div class="auth-error">❌ {{ error }}</div>
    {% endif %}

    <form method="POST" action="{{ url_for('register') }}" id="register-form">
      <div class="form-group">
        <label>Full Name</label>
        <input
          type="text"
          name="name"
          id="name"
          placeholder="Your full name"
          required
        />
        <span class="field-error" id="name-error"></span>
      </div>
      <div class="form-group">
        <label>Email Address</label>
        <input
          type="email"
          name="email"
          id="email"
          placeholder="name@example.com"
          required
        />
        <span class="field-error" id="email-error"></span>
      </div>
      <div class="form-group">
        <label>Phone Number</label>
        <input
          type="text"
          name="phone"
          id="phone"
          placeholder="e.g. 0788123456"
          required
        />
        <span class="field-error" id="phone-error"></span>
      </div>
      <div class="form-group">
        <label>Delivery Address</label>
        <input
          type="text"
          name="address"
          id="address"
          placeholder="Your delivery address"
          required
        />
        <span class="field-error" id="address-error"></span>
      </div>
      <div class="form-group">
        <label>Password</label>
        <input
          type="password"
          name="password"
          id="password"
          placeholder="At least 8 characters"
          required
        />
        <span class="field-error" id="password-error"></span>
      </div>
      <div class="form-group">
        <label>Confirm Password</label>
        <input
          type="password"
          name="confirm_password"
          id="confirm_password"
          placeholder="Repeat your password"
          required
        />
        <span class="field-error" id="confirm-error"></span>
      </div>

      <button type="submit" class="btn-primary" style="width: 100%">
        Create Account
      </button>
    </form>

    <p class="auth-switch">
      Already have an account?
      <a href="{{ url_for('customer_login') }}">Login here</a>
    </p>
  </div>
</section>

<script>
  const form = document.getElementById("register-form");

  function showError(fieldId, message) {
    document.getElementById(fieldId).innerText = message;
  }

  function clearError(fieldId) {
    document.getElementById(fieldId).innerText = "";
  }

  document.getElementById("name").addEventListener("input", function () {
    if (this.value.trim().length < 2) {
      showError("name-error", "Name must be at least 2 characters");
    } else {
      clearError("name-error");
    }
  });

  document.getElementById("email").addEventListener("input", function () {
    const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
    if (!emailRegex.test(this.value)) {
      showError("email-error", "Please enter a valid email address");
    } else {
      clearError("email-error");
    }
  });

  document.getElementById("phone").addEventListener("input", function () {
    const phoneRegex = /^[0-9]{10,12}$/;
    if (!phoneRegex.test(this.value.replace(/\s/g, ""))) {
      showError("phone-error", "Phone must be 10-12 digits");
    } else {
      clearError("phone-error");
    }
  });

  document.getElementById("password").addEventListener("input", function () {
    if (this.value.length < 8) {
      showError("password-error", "Password must be at least 8 characters");
    } else {
      clearError("password-error");
    }
  });

  document
    .getElementById("confirm_password")
    .addEventListener("input", function () {
      if (this.value !== document.getElementById("password").value) {
        showError("confirm-error", "Passwords do not match");
      } else {
        clearError("confirm-error");
      }
    });

  form.addEventListener("submit", function (e) {
    let valid = true;

    const name = document.getElementById("name").value.trim();
    const email = document.getElementById("email").value.trim();
    const phone = document.getElementById("phone").value.trim();
    const password = document.getElementById("password").value;
    const confirm = document.getElementById("confirm_password").value;
    const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
    const phoneRegex = /^[0-9]{10,12}$/;

    if (name.length < 2) {
      showError("name-error", "Name must be at least 2 characters");
      valid = false;
    }
    if (!emailRegex.test(email)) {
      showError("email-error", "Please enter a valid email address");
      valid = false;
    }
    if (!phoneRegex.test(phone.replace(/\s/g, ""))) {
      showError("phone-error", "Phone must be 10-12 digits");
      valid = false;
    }
    if (password.length < 8) {
      showError("password-error", "Password must be at least 8 characters");
      valid = false;
    }
    if (password !== confirm) {
      showError("confirm-error", "Passwords do not match");
      valid = false;
    }

    if (!valid) e.preventDefault();
  });
</script>
{% endblock %}

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Edit Product - QuickBite Kigali</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <script>
        if (localStorage.getItem('lightMode') === 'true') {
            document.body.classList.add('light-mode');
        }
    </script>
</head>
<body>

<nav class="navbar">
    <div class="nav-container">
        <a href="{{ url_for('dashboard') }}" class="nav-logo">🍔 QuickBite Admin</a>
        <div style="display:flex; gap:10px;">
            <a href="{{ url_for('admin_products') }}" class="btn-secondary">← Back to Products</a>
            <a href="{{ url_for('admin_logout') }}" class="btn-secondary">Logout</a>
        </div>
    </div>
</nav>

<section class="dashboard">
    <h1>✏️ Edit Menu Item</h1>

    {% if error %}
    <p class="error">{{ error }}</p>
    {% endif %}

    <div class="dashboard-section" style="max-width:600px; margin-top:30px;">
        <form method="POST" action="{{ url_for('edit_product', id=product['id']) }}">
            <div class="form-group">
                <label>Item Name</label>
                <input type="text" name="name" value="{{ product['name'] }}" required>
            </div>
            <div class="form-group">
                <label>Description</label>
                <textarea name="description" rows="3" required>{{ product['description'] }}</textarea>
            </div>
            <div class="form-group">
                <label>Price (RWF)</label>
                <input type="number" name="price" value="{{ product['price'] }}" required>
            </div>
            <div class="form-group">
                <label>Category</label>
                <select name="category" style="width:100%; padding:14px 18px; background:var(--surface); border:1px solid var(--border); border-radius:12px; color:var(--text); font-size:1rem;">
                    <option value="Burgers" {% if product['category'] == 'Burgers' %}selected{% endif %}>Burgers</option>
                    <option value="Pizza" {% if product['category'] == 'Pizza' %}selected{% endif %}>Pizza</option>
                    <option value="Sides" {% if product['category'] == 'Sides' %}selected{% endif %}>Sides</option>
                    <option value="Drinks" {% if product['category'] == 'Drinks' %}selected{% endif %}>Drinks</option>
                </select>
            </div>
            <div class="form-group">
                <label>Image URL</label>
                <input type="text" name="image" value="{{ product['image'] }}">
            </div>
            <div class="form-group">
                <label>Stock</label>
                <input type="number" name="stock" value="{{ product['stock'] }}" required>
            </div>
            <button type="submit" class="btn-primary">Save Changes</button>
        </form>
    </div>
</section>

</body>
</html>

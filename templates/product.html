{% extends 'base.html' %} {% block content %}
<section class="product-page">
  <div class="product-detail">
    <img
      src="{{ product['image'] }}"
      alt="{{ product['name'] }}"
      class="product-image-large"
    />
    <div class="product-detail-info">
      <h1>{{ product['name'] }}</h1>
      <p class="category">{{ product['category'] }}</p>
      <p class="description">{{ product['description'] }}</p>
      <p class="price-large">RWF {{ product['price'] }}</p>

      <div class="quantity-selector">
        <button onclick="decreaseQty()">-</button>
        <span id="qty">1</span>
        <button onclick="increaseQty()">+</button>
      </div>

      <button
        class="btn-primary"
        onclick="
          addToCartFromDetail(
            this.dataset.id,
            this.dataset.name,
            this.dataset.price,
          )
        "
        data-id="{{ product['id'] }}"
        data-name="{{ product['name'] }}"
        data-price="{{ product['price'] }}"
      >
        Add to Cart
      </button>

      <a href="{{ url_for('menu') }}" class="btn-secondary">Back to Menu</a>
    </div>
  </div>
</section>

<script>
  function decreaseQty() {
    let qty = parseInt(document.getElementById("qty").innerText);
    if (qty > 1) document.getElementById("qty").innerText = qty - 1;
  }

  function increaseQty() {
    let qty = parseInt(document.getElementById("qty").innerText);
    document.getElementById("qty").innerText = qty + 1;
  }

  function addToCartFromDetail(id, name, price) {
    let qty = parseInt(document.getElementById("qty").innerText);
    for (let i = 0; i < qty; i++) {
      addToCart(id, name, price);
    }
  }
</script>
{% endblock %}
